<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kendi Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
 <header>
    <nav>
     <a class="brand" href="#home">Portfolio</a>
      <div class="nav-links">
         <a href="#home">Home</a>
         <a href="#about">About</a>
         <a href="#work">Work</a>
         <a href="#resume">Resume</a>
         <a href="#contact">Contact</a>
     </div>
    </nav>
 </header> 

    <!-- INSERTED MY PORTFOLIO PFP -->
    <section id="home" class="hero-section">
        <div class="profile-container">
            <img src="portfolio.png" alt="Profile Picture" class="profile-pic">   
        </div>
        <h1>Hi, I'm Kendi</h1>
        <p>Welcome to my portfolio mockup.</p>
    </section>

 <!-- CONTACT SECTION -->
  
        <section id="contact">
            <h2>Contact</h2>
            <p>Use the form below to get in touch.</p>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com">

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Write your message here"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>

    <footer>
        <p>© 2026 My Portfolio. All rights reserved.</p>
    </footer>
</body>
</html>
